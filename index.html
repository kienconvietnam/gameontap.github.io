<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>G-Music Offline Player</title>
    <style>
        :root { --primary: #00d2ff; --accent: #3a7bd5; --glass: rgba(255, 255, 255, 0.1); }
        body {
            margin: 0; font-family: 'Inter', sans-serif;
            background: #0f0c29; color: white;
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
        }
        .container { width: 90%; max-width: 450px; padding: 20px; }
        
        /* Glassmorphism UI */
        .glass-panel {
            background: var(--glass); backdrop-filter: blur(15px);
            border-radius: 20px; border: 1px solid rgba(255,255,255,0.1);
            padding: 20px; margin-bottom: 20px; box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }

        .input-group { display: flex; gap: 10px; }
        input {
            flex: 1; background: rgba(255,255,255,0.05); border: 1px solid var(--glass);
            border-radius: 10px; color: white; padding: 10px; outline: none;
        }
        button {
            background: linear-gradient(to right, var(--primary), var(--accent));
            border: none; color: white; padding: 10px 15px; border-radius: 10px; cursor: pointer;
        }

        /* Playlist Style */
        .playlist { max-height: 300px; overflow-y: auto; margin-top: 10px; }
        .track-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.05);
            cursor: pointer; transition: 0.2s;
        }
        .track-item:hover { background: rgba(255,255,255,0.05); }
        .track-item.active { border-left: 4px solid var(--primary); background: rgba(0,210,255,0.1); }
        
        .now-playing { text-align: center; }
        .controls { display: flex; justify-content: center; gap: 30px; margin-top: 15px; font-size: 24px; }
        .delete-btn { color: #ff4757; font-size: 12px; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="text-align: center;">🎵 X-Player Offline</h2>

    <div class="glass-panel">
        <div class="input-group">
            <input type="text" id="linkInput" placeholder="Dán link mp3 tại đây...">
            <button onclick="downloadTrack()">Tải & Lưu</button>
        </div>
        <p id="status" style="font-size: 12px; margin-top: 10px; color: var(--primary);"></p>
    </div>

    <div class="glass-panel now-playing">
        <div id="trackTitle">Chưa có bài hát</div>
        <div class="controls">
            <span onclick="prevTrack()" style="cursor:pointer">⏮</span>
            <span id="playBtn" onclick="togglePlay()" style="cursor:pointer">▶</span>
            <span onclick="nextTrack()" style="cursor:pointer">⏭</span>
        </div>
        <audio id="audioPlayer"></audio>
    </div>

    <div class="glass-panel">
        <div style="font-weight: bold; margin-bottom: 10px;">Kho lưu trữ đã tải</div>
        <div id="playlist" class="playlist"></div>
    </div>
</div>

<script>
    let db;
    let playlist = [];
    let currentIndex = -1;
    const audio = document.getElementById('audioPlayer');
    const status = document.getElementById('status');

    // 1. Khởi tạo Database (IndexedDB)
    const request = indexedDB.open("MusicDB", 1);
    request.onupgradeneeded = e => {
        db = e.target.result;
        db.createObjectStore("songs", { keyPath: "id", autoIncrement: true });
    };
    request.onsuccess = e => {
        db = e.target.result;
        loadPlaylist();
    };

    // 2. Tải nhạc từ Link và Lưu vào kho
    async function downloadTrack() {
        const url = document.getElementById('linkInput').value;
        if (!url) return;

        status.innerText = "Đang tải dữ liệu...";
        try {
            const response = await fetch(url);
            const blob = await response.blob();
            const fileName = url.split('/').pop().split('?')[0] || "Bài hát mới";

            const transaction = db.transaction(["songs"], "readwrite");
            const store = transaction.objectStore("songs");
            store.add({ name: fileName, data: blob });

            transaction.oncomplete = () => {
                status.innerText = "Đã thêm vào kho lưu trữ!";
                document.getElementById('linkInput').value = "";
                loadPlaylist();
            };
        } catch (err) {
            status.innerText = "Lỗi: Link không hỗ trợ hoặc chặn truy cập!";
        }
    }

    // 3. Hiển thị danh sách nhạc
    function loadPlaylist() {
        const store = db.transaction("songs").objectStore("songs");
        const request = store.getAll();
        request.onsuccess = () => {
            playlist = request.result;
            const container = document.getElementById('playlist');
            container.innerHTML = "";
            playlist.forEach((song, index) => {
                const item = document.createElement('div');
                item.className = `track-item ${index === currentIndex ? 'active' : ''}`;
                item.innerHTML = `
                    <div onclick="playSong(${index})">${song.name}</div>
                    <div class="delete-btn" onclick="deleteSong(${song.id})">Xóa</div>
                `;
                container.appendChild(item);
            });
        };
    }

    // 4. Logic phát nhạc
    function playSong(index) {
        if (index < 0 || index >= playlist.length) return;
        currentIndex = index;
        const song = playlist[currentIndex];
        const url = URL.createObjectURL(song.data);
        
        audio.src = url;
        audio.play();
        document.getElementById('trackTitle').innerText = song.name;
        document.getElementById('playBtn').innerText = "⏸";
        loadPlaylist();
    }

    function togglePlay() {
        if (audio.paused) { audio.play(); document.getElementById('playBtn').innerText = "⏸"; }
        else { audio.pause(); document.getElementById('playBtn').innerText = "▶"; }
    }

    // Tự động chuyển bài khi hết (Auto-next)
    audio.onended = () => {
        nextTrack();
    };

    function nextTrack() {
        if (currentIndex < playlist.length - 1) playSong(currentIndex + 1);
        else playSong(0); // Quay lại bài đầu
    }

    function prevTrack() {
        if (currentIndex > 0) playSong(currentIndex - 1);
    }

    function deleteSong(id) {
        const transaction = db.transaction(["songs"], "readwrite");
        transaction.objectStore("songs").delete(id);
        transaction.oncomplete = () => loadPlaylist();
    }
</script>
</body>
</html>
