<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>X-Music Pro: Preview & Download</title>
    <style>
        :root { --primary: #ff4757; --bg: #0f0c29; --glass: rgba(255, 255, 255, 0.1); }
        body {
            margin: 0; font-family: 'Segoe UI', sans-serif;
            background: var(--bg); color: white; display: flex; flex-direction: column; align-items: center; min-height: 100vh;
        }
        .container { width: 90%; max-width: 500px; padding: 20px; }
        
        .glass-card {
            background: var(--glass); backdrop-filter: blur(15px);
            border-radius: 20px; border: 1px solid rgba(255,255,255,0.1);
            padding: 20px; margin-bottom: 20px;
        }

        .search-area { display: flex; gap: 10px; }
        input {
            flex: 1; background: rgba(0,0,0,0.3); border: 1px solid #444;
            border-radius: 10px; color: white; padding: 12px; outline: none;
        }
        button {
            background: var(--primary); border: none; color: white;
            padding: 10px 20px; border-radius: 10px; cursor: pointer; font-weight: bold;
        }

        /* Khu vực xem trước */
        #previewArea { display: none; text-align: center; animation: fadeIn 0.5s; }
        .thumb-preview { width: 100%; border-radius: 15px; margin-top: 15px; }
        
        /* Danh sách kho nhạc */
        .playlist { max-height: 250px; overflow-y: auto; }
        .track-item {
            display: flex; justify-content: space-between; padding: 12px;
            border-bottom: 1px solid rgba(255,255,255,0.05); cursor: pointer;
        }
        .track-item:hover { background: rgba(255,255,255,0.1); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="container">
    <h2 style="text-align: center;">🎵 YouTube Offline Player</h2>

    <div class="glass-card">
        <div class="search-area">
            <input type="text" id="linkInput" placeholder="Dán link YouTube vào đây...">
            <button onclick="checkVideo()">Kiểm tra</button>
        </div>
    </div>

    <div id="previewArea" class="glass-card">
        <img id="prevThumb" class="thumb-preview" src="" alt="Thumbnail">
        <h3 id="prevTitle" style="font-size: 16px; margin: 15px 0;"></h3>
        <button id="downloadBtn" onclick="saveToLibrary()" style="width: 100%; background: #2ecc71;">
            Xác nhận & Tải xuống kho lưu trữ
        </button>
    </div>

    <div class="glass-card" style="text-align: center;">
        <div id="nowPlaying">Đang dừng...</div>
        <audio id="mainAudio" controls style="width: 100%; margin-top: 15px;"></audio>
    </div>

    <div class="glass-card">
        <div style="font-weight: bold; margin-bottom: 10px; display: flex; justify-content: space-between;">
            <span>Kho nhạc của bạn</span>
            <span id="storageInfo" style="font-size: 10px; color: #aaa;">Offline</span>
        </div>
        <div id="playlist" class="playlist"></div>
    </div>
</div>

<script>
    let db;
    let currentPreview = null;
    const audio = document.getElementById('mainAudio');

    // Khởi tạo Database (Giữ nguyên)
    const request = indexedDB.open("MusicStore", 1);
    request.onupgradeneeded = e => {
        db = e.target.result;
        db.createObjectStore("songs", { keyPath: "id", autoIncrement: true });
    };
    request.onsuccess = e => { db = e.target.result; loadLibrary(); };

    // 1. Hàm bóc tách ID Video cực mạnh (Sửa lỗi hiển thị hình)
    function getYouTubeID(url) {
        const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
        const match = url.match(regExp);
        return (match && match[2].length == 11) ? match[2] : null;
    }

    async function checkVideo() {
        const url = document.getElementById('linkInput').value;
        const videoId = getYouTubeID(url);
        
        if (!videoId) {
            alert("Link YouTube không hợp lệ! Hãy copy link từ trình duyệt.");
            return;
        }

        const thumbElement = document.getElementById('prevThumb');
        const titleElement = document.getElementById('prevTitle');
        const previewArea = document.getElementById('previewArea');

        // Cập nhật Thumbnail với độ phân giải cao
        thumbElement.src = `https://i.ytimg.com/vi/${videoId}/hqdefault.jpg`;
        thumbElement.setAttribute("referrerpolicy", "no-referrer"); // Quan trọng để hiện hình
        
        titleElement.innerText = "Đang kiểm tra thông tin...";
        previewArea.style.display = 'block';

        // Giả lập thông tin tải (Lưu ý: Bạn cần thay link demo bằng link mp3 thật để nút Tải hoạt động)
        currentPreview = {
            title: "Video ID: " + videoId,
            url: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3", // Link demo
            thumb: thumbElement.src
        };
        
        titleElement.innerText = "Xác nhận video: " + videoId;
    }

    // 2. Lưu vào kho lưu trữ (Auto-next logic thêm ở đây)
async function saveToLibrary() {
    if (!currentPreview) return;
    const btn = document.getElementById('downloadBtn');
    btn.innerText = "Đang vượt rào cản bảo mật...";
    btn.disabled = true;

    try {
        // Sử dụng một Proxy trung gian để tránh lỗi CORS khi chạy trên Chrome
        const proxyUrl = "https://api.allorigins.win/raw?url=";
        const targetUrl = encodeURIComponent(currentPreview.url);

        const response = await fetch(proxyUrl + targetUrl);
        if (!response.ok) throw new Error("Server chặn tải");
        
        const blob = await response.blob();

        const transaction = db.transaction(["songs"], "readwrite");
        const store = transaction.objectStore("songs");
        store.add({ 
            name: currentPreview.title, 
            data: blob, 
            thumb: currentPreview.thumb 
        });

        transaction.oncomplete = () => {
            btn.innerText = "Đã lưu vào kho Offline!";
            btn.style.background = "#27ae60";
            setTimeout(() => {
                document.getElementById('previewArea').style.display = 'none';
                btn.disabled = false;
                btn.innerText = "Xác nhận & Tải xuống kho lưu trữ";
            }, 1500);
            loadLibrary();
        };
    } catch (err) {
        console.error(err);
        alert("Vẫn bị lỗi CORS! Cách sửa: Bạn hãy cài extension 'Allow CORS' trên Chrome hoặc chạy qua Live Server.");
        btn.disabled = false;
        btn.innerText = "Thử lại lần nữa";
    }
}

    // 3. Load & Play (Có Auto-Next)
    let songList = [];
    let currentPlayingId = null;

    function loadLibrary() {
        const store = db.transaction("songs").objectStore("songs");
        const request = store.getAll();
        request.onsuccess = () => {
            const list = document.getElementById('playlist');
            list.innerHTML = "";
            songList = request.result;
            songList.forEach((song) => {
                const item = document.createElement('div');
                item.className = "track-item";
                item.innerHTML = `
                    <span style="flex:1">🎵 ${song.name}</span>
                    <span style="color:#ff4757; font-size:12px; padding:5px" onclick="deleteSong(event, ${song.id})">Xóa</span>
                `;
                item.onclick = () => playSong(song);
                list.appendChild(item);
            });
        };
    }

    function playSong(song) {
        currentPlayingId = song.id;
        const url = URL.createObjectURL(song.data);
        audio.src = url;
        audio.play();
        document.getElementById('nowPlaying').innerText = "Đang phát: " + song.name;
    }

    // Tự động chuyển bài (Auto-next)
    audio.onended = () => {
        const currentIndex = songList.findIndex(s => s.id === currentPlayingId);
        if (currentIndex !== -1 && currentIndex < songList.length - 1) {
            playSong(songList[currentIndex + 1]);
        } else {
            playSong(songList[0]); // Hết danh sách thì quay lại bài đầu
        }
    };

    function deleteSong(e, id) {
        e.stopPropagation(); // Ngăn việc bấm Xóa mà nó lại chạy nhạc
        const transaction = db.transaction(["songs"], "readwrite");
        transaction.objectStore("songs").delete(id);
        transaction.oncomplete = () => loadLibrary();
    }
</script>
</body>
</html>
